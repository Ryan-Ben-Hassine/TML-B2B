<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <title>3D Print Shop</title>
  <style>
    body { background-color: #f5f5f5; }
    .loading { display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
  </style>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var el = document.querySelector('.loading');
      if (el) el.remove();
    });
  </script>
</head>
<body>
  <div class="loading">Chargement de la boutique...</div>
  <script>
    // Ensure Flutter starts on the actual browser path (supports deep links like /manage).
    window.flutter_initial_route = window.location.pathname + window.location.search + window.location.hash;
  </script>
  <script src="config.js"></script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
